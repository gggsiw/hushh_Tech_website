# =============================================================================
# Cloud Build — UAT Pipeline (develop branch → hushh-tech-uat project)
#
# Trigger: Push to `develop` branch → Build → Deploy to Cloud Run (UAT)
# Project: hushh-tech-uat
# =============================================================================

steps:
  # Step 1: Build Docker image with VITE_* build args
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.gcp'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'VITE_SUPABASE_REDIRECT_URL=${_VITE_SUPABASE_REDIRECT_URL}'
      - '--build-arg'
      - 'VITE_KYC_ENV=${_VITE_KYC_ENV}'
      - '--build-arg'
      - 'VITE_KYC_DEMO_MODE=${_VITE_KYC_DEMO_MODE}'
      - '--build-arg'
      - 'VITE_KYC_API_BASE=${_VITE_KYC_API_BASE}'
      - '--build-arg'
      - 'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '.'

  # Step 2: Push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest']

  # Step 3: Deploy to Cloud Run (UAT)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--concurrency'
      - '250'
      - '--timeout'
      - '60s'
      - '--set-env-vars'
      - 'NODE_ENV=staging,GEMINI_API_KEY=${_GEMINI_API_KEY},GEMINI_API_KEY_2=${_GEMINI_API_KEY_2},GEMINI_API_KEY_3=${_GEMINI_API_KEY_3},GEMINI_API_KEY_4=${_GEMINI_API_KEY_4},SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY}'

substitutions:
  _SERVICE_NAME: hushh-tech-website
  _REGION: us-central1
  _VITE_KYC_ENV: staging
  _VITE_KYC_DEMO_MODE: 'true'

timeout: '1200s'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
