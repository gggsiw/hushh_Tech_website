name: Deploy to UAT
on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Build & Deploy to Cloud Run (UAT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Build Vite app in runner (FAST — no Docker needed)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx vite build

      # 2. Auth with GCP
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_UAT }}

      - uses: google-github-actions/setup-gcloud@v2

      # 3. Deploy pre-built dist/ to Cloud Run (runtime-only Dockerfile)
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy hushh-tech-website \
            --source . \
            --project=hushh-tech-uat \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --port=8080 \
            --quiet
